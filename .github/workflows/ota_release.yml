name: OTA Firmware CI/CD

on:
  push:
    tags:
      - 'v*.*.*' # Triggers automatically when you push a tag like 'v1.0.1'

permissions:
  contents: write # Grants the bot permission to create releases and commit code

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        # Note: Change 'esp32dev' if your platformio.ini uses a different environment name
        run: pio run -e esp32dev 

      - name: Rename and Extract Firmware
        run: |
          # Grab the compiled .bin and rename it cleanly
          cp .pio/build/esp32dev/firmware.bin firmware_4MB.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware_4MB.bin
          generate_release_notes: true

      - name: Update manifest.json
        run: |
          # 1. Strip the 'v' from the tag (e.g., 'v1.0.1' becomes '1.0.1')
          VERSION=${GITHUB_REF_NAME#v}
          
          # 2. Construct the exact download URL for the GitHub Release
          BIN_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/firmware_4MB.bin"
          
          echo "Updating JSON to Version: $VERSION"
          echo "New URL: $BIN_URL"
          
          # 3. Use 'jq' (a JSON command line tool) to rewrite the JSON file
          jq --arg ver "$VERSION" --arg url "$BIN_URL" \
             '.Configurations[0].Version = $ver | .Configurations[0].URL = $url' \
             manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Commit and Push Updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          
          # Use [skip ci] so pushing this change doesn't trigger another workflow
          git commit -m "chore: update OTA manifest to version ${{ github.ref_name }} [skip ci]"
          git push
          
