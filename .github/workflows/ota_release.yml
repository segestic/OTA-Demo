name: OTA Firmware CI/CD

on:
  # 1. Triggers a test build on every normal push to main
  push:
    branches:
      - main
  # 2. Triggers the full OTA Release process when you push a tag
    tags:
      - 'v*.*.*' 

permissions:
  contents: write # Required to create releases and commit the JSON

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Insight from Android Script: Explicitly set Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        env:
          # Pulls your GitHub Secrets into the build environment
          SECRET_WIFI_SSID: ${{ secrets.SECRET_WIFI_SSID }}
          SECRET_WIFI_PASS: ${{ secrets.SECRET_WIFI_PASS }}
        run: pio run -e esp32dev 

      - name: Rename and Extract Firmware
        run: |
          cp .pio/build/esp32dev/firmware.bin firmware_4MB.bin

      # Insight from Android Script: Always save the artifact!
      # Even if you don't release it, you can download it from the Actions tab.
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware_4MB.bin
          retention-days: 5

      # =========================================================
      # ⚠️ THE STEPS BELOW ONLY RUN IF YOU PUSHED A 'v' TAG
      # =========================================================
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware_4MB.bin
          generate_release_notes: true

      - name: Update manifest.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git checkout main
          VERSION=${GITHUB_REF_NAME#v}
          BIN_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/firmware_4MB.bin"
          
          echo "Updating JSON to Version: $VERSION"
          echo "New URL: $BIN_URL"
          
          # ADDED the -c flag right after jq to force a single-line output
          jq -c --arg ver "$VERSION" --arg url "$BIN_URL" \
             '.Configurations[0].Version = $ver | .Configurations[0].URL = $url' \
             manifest.json > tmp.json && mv tmp.json manifest.json
             

      - name: Commit and Push Updated JSON and Binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force add the binary to override the .gitignore file!
          git add manifest.json
          git add -f firmware_4MB.bin 
          
          git commit -m "chore: release version ${{ github.ref_name }} [skip ci]"
          git push origin main
